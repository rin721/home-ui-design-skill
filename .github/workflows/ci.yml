name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate skill
        run: python scripts/validate_skill.py .

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: examples/react-demo/package-lock.json

      - name: Install demo dependencies
        working-directory: examples/react-demo
        run: npm ci

      - name: Build demo
        working-directory: examples/react-demo
        run: npm run build
